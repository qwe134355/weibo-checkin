name: 微博超话每日签到
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 执行签到
        env:
          WEIBO_COOKIES: ${{ secrets.WEIBO_COOKIES }}
        run: node checkin-pure.mjs
